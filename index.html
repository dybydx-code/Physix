<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="style.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Physix</title>
</head>
<body>

  <main>
    <h1>Welcome to Physix</h1>
    <p>Your Physics Calculator</p>
    <section id="input-area">
    <h2 id="selected-formula">Select a formula</h2>
    </section>
    <section class="formula-list">
      <div class = "category">
        <h3>Kinematics (<span>Δ</span>)</h3>
        <button>v = u + at</button>
        <button>s = ut + ½at²</button>
        <button>v² = u² + 2as</button>
        <button>a = (v - u) / t</button>
      </div>

      <div class = "category">
        <h3>Dynamics (<span>Σ</span>)</h3>
        <button>F = ma</button>
        <button>p (momentum) = mv</button>
        <button>P (pressure) = F/A</button>
      </div>

      <div class = "category">
        <h3>Energy (<span>E</span>)</h3>
        <button>W = Fs</button>
        <button>P = W/t</button>
        <button>KE = ½mv²</button>
        <button>PE = mgh</button>
        <button>E = mc²</button>
      </div>

      <div class = "category">
        <h3>Electricity (<span>Ω</span>)</h3>
        <button>V = IR</button>
        <button>I = Q/t</button>
        <button>F = KQq/r²</button>
      </div>
      
      <div class = "category">
        <h3>Waves (<span>λ</span>)</h3>
        <button>v = fλ</button>
        <button>T = 1/f</button>
        <button>ω = 2πf</button>
      </div>

      <div class = "category">
        <h3>Properties (<span>ρ</span>)</h3>
        <button>ρ = m/V</button>
        <button>Q = mcΔT</button>
      </div>

    </section>
  </main>
  <hr>
  <p class="present">
    by Thanakit Netdam
  </p>
  <p class="present">
    Present to 
    <img src="Black_Yellow_white-12-re.png" alt="logo">
  </p>
  <script src="script.js"></script>
</body>
</html>
